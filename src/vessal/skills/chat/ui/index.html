<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vessal Agent</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Left panel: Chat -->
<div class="chat-panel">
  <div class="chat-header">
    <span>Chat</span>
    <span class="status"><span class="status-dot" id="statusDot"></span> <span id="statusText">--</span></span>
  </div>
  <div class="chat-messages" id="chatMessages"></div>
  <div class="chat-input-area">
    <input type="text" id="chatInput" placeholder="Send a message..." />
    <button id="sendBtn">Send</button>
  </div>
</div>

<!-- Right panel: Frame Log -->
<div class="frame-panel">
  <div class="frame-panel-header">
    <span class="title">Frame Log</span>
    <span class="status" id="frameStats">0 frames</span>
  </div>
  <div class="toggle-bar" id="toggleBar">
    <!-- toggle checkboxes dynamically generated by app.js -->
  </div>
  <div class="frame-list" id="frameList"></div>
</div>

<script src="render.js"></script>
<script src="app.js"></script>
</body>
</html>
