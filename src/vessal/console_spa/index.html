<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Vessal Console</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="assets/style.css" />
  <script type="module" src="assets/app.js"></script>
  <script defer src="assets/alpine.min.js"></script>
</head>
<body>
  <div id="app" x-data="consoleApp" x-init="init()">
    <header class="top-nav">
      <span class="brand">Vessal</span>
      <span class="project" x-text="project"></span>
      <span class="state" :class="state.sleeping ? 'idle' : 'active'"
            x-text="state.sleeping ? '● sleep' : '● active'"></span>
    </header>

    <template x-if="banner">
      <div class="banner" :class="banner.level" x-text="banner.text"></div>
    </template>

    <div class="layout">
      <nav class="activity-bar" aria-label="views">
        <template x-for="v in views" :key="v.id">
          <button class="nav-btn"
                  :class="{active: current === v.id}"
                  @click="current = v.id"
                  :title="v.label"
                  x-text="v.icon"></button>
        </template>
      </nav>

      <main class="main">
        <template x-if="current === 'frames'">
          <section class="frames-layout" x-init="loadFrames()">
            <ol class="frame-list">
              <template x-for="f in frames" :key="f.number">
                <li :class="{active: selectedFrame === f.number}" @click="selectFrame(f)">
                  <span class="n" x-text="'#' + f.number"></span>
                  <span class="excerpt" x-text="frameExcerpt(f)"></span>
                </li>
              </template>
            </ol>
            <aside class="frame-detail">
              <template x-if="currentFrame">
                <div>
                  <h3 x-text="'Frame #' + currentFrame.number + (currentFrame.wake ? '  ·  ' + currentFrame.wake : '')"></h3>
                  <template x-if="currentFrame.pong?.think">
                    <div class="frame-section"><div class="frame-label">think</div>
                      <pre class="think" x-text="currentFrame.pong.think"></pre></div>
                  </template>
                  <template x-if="currentFrame.pong?.action">
                    <div class="frame-section"><div class="frame-label">action</div>
                      <pre class="action" x-text="actionText(currentFrame.pong.action)"></pre></div>
                  </template>
                  <template x-if="currentFrame.pong?.action?.expect">
                    <div class="frame-section"><div class="frame-label">expect</div>
                      <pre class="expect" x-text="currentFrame.pong.action.expect"></pre></div>
                  </template>
                  <template x-if="currentFrame.observation?.stdout">
                    <div class="frame-section"><div class="frame-label">stdout</div>
                      <pre class="observation" x-text="currentFrame.observation.stdout"></pre></div>
                  </template>
                  <template x-if="currentFrame.observation?.error">
                    <div class="frame-section"><div class="frame-label">error</div>
                      <pre class="error" x-text="currentFrame.observation.error"></pre></div>
                  </template>
                </div>
              </template>
              <template x-if="!currentFrame">
                <p class="placeholder">(no current frame)</p>
              </template>
            </aside>
          </section>
        </template>
        <template x-for="v in views.filter(x => x.id.startsWith('skill:'))" :key="v.id">
          <section x-show="current === v.id" class="skill-iframe-wrap">
            <iframe :src="v.url" class="skill-iframe"></iframe>
          </section>
        </template>
      </main>
    </div>
  </div>
</body>
</html>
